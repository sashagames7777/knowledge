<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общая база знаний</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .chat-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: relative;
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 500;
            text-align: center;
        }
        
        .header p {
            text-align: center;
            opacity: 0.9;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .secret-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        
        .secret-btn:hover { opacity: 1; }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .typing-indicator {
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            align-self: flex-start;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            background: white;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .input-area button:hover { transform: scale(1.05); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            display: none;
        }
        
        .admin-panel.show { display: block; }
        
        .admin-panel h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .admin-panel textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
        }
        
        .admin-panel input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .admin-panel button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .overlay.show { display: block; }
        
        .status-badge {
            font-size: 11px;
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-card">
        <div class="header">
            <h1>
                📚 Общая база знаний
                <span class="status-badge" id="dbStatus">активно</span>
            </h1>
            <p>Задайте вопрос — получите ответ из общей базы</p>
            <button class="secret-btn" onclick="openAdminPanel()" title="Админ-панель">⚙️</button>
        </div>
        
        <div class="messages-area" id="messages">
            <div class="message bot-message">
                👋 Привет! Я отвечаю на основе общей базы знаний.<br>
                Задайте любой вопрос по загруженным документам.
            </div>
        </div>
        
        <div class="typing-indicator" id="typing">
            <span></span><span></span><span></span>
        </div>
        
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Введите ваш вопрос..." onkeypress="handleKeyPress(event)">
            <button onclick="askQuestion()" id="askBtn">➤</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAdminPanel()"></div>

<div class="admin-panel" id="adminPanel">
    <h2>🔐 Администрирование</h2>
    <input type="password" id="adminPass" placeholder="Пароль" value="">
    <textarea id="knowledgeText" placeholder="Вставьте сюда текст базы знаний..."></textarea>
    <div style="display: flex; gap: 10px;">
        <button class="btn-primary" onclick="updateKnowledge()">📤 Обновить базу</button>
        <button class="btn-secondary" onclick="closeAdminPanel()">Отмена</button>
    </div>
    <p id="adminStatus" style="margin-top: 15px; font-size: 14px;"></p>
    <p style="margin-top: 20px; font-size: 12px; color: #999;">
        💡 База общая для всех. Изменения видны сразу.
    </p>
</div>

<script>
// ========== ХРАНИЛИЩЕ НА GITHUB ==========
// Используем GitHub Gist как бесплатное облако
const GIST_ID = ''; // Оставь пустым — создастся автоматически
const GIST_TOKEN = ''; // Оставь пустым — будет использоваться localStorage
const ADMIN_PASS = 'admin123';

// Локальное хранилище (работает всегда)
let knowledgeBase = localStorage.getItem('shared_knowledge') || 'База знаний пока пуста. Администратор ещё не добавил информацию.';

// ========== ИНИЦИАЛИЗАЦИЯ ==========
window.onload = function() {
    // Пытаемся загрузить из облака (Gist)
    loadFromCloud();
};

// ========== ЗАГРУЗКА ИЗ ОБЛАКА ==========
async function loadFromCloud() {
    // Если есть токен — пробуем загрузить из Gist
    const token = localStorage.getItem('gist_token');
    const gistId = localStorage.getItem('gist_id');
    
    if (token && gistId) {
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                const content = data.files['knowledge.txt']?.content || '';
                if (content) {
                    knowledgeBase = content;
                    localStorage.setItem('shared_knowledge', content);
                    document.getElementById('dbStatus').textContent = '☁️ облако';
                    document.getElementById('dbStatus').style.color = '#90EE90';
                }
            }
        } catch (e) {
            console.log('Офлайн-режим');
            document.getElementById('dbStatus').textContent = '📦 локально';
        }
    }
    
    // Загружаем текущую базу в админку при открытии
    const textarea = document.getElementById('knowledgeText');
    if (textarea) textarea.value = knowledgeBase;
}

// ========== СОХРАНЕНИЕ В ОБЛАКО ==========
async function saveToCloud(text) {
    const token = localStorage.getItem('gist_token');
    let gistId = localStorage.getItem('gist_id');
    
    // Если нет токена — просим ввести
    if (!token) {
        const newToken = prompt('Введите GitHub Token (создать: github.com/settings/tokens):');
        if (!newToken) {
            // Сохраняем только локально
            knowledgeBase = text;
            localStorage.setItem('shared_knowledge', text);
            return 'local';
        }
        localStorage.setItem('gist_token', newToken);
    }
    
    try {
        const headers = {
            'Authorization': `token ${localStorage.getItem('gist_token')}`,
            'Content-Type': 'application/json'
        };
        
        let method = 'POST';
        let url = 'https://api.github.com/gists';
        let body = {
            description: 'Shared Knowledge Base',
            public: false,
            files: {
                'knowledge.txt': { content: text }
            }
        };
        
        // Если уже есть Gist ID — обновляем его
        if (gistId) {
            method = 'PATCH';
            url = `https://api.github.com/gists/${gistId}`;
            body = {
                files: {
                    'knowledge.txt': { content: text }
                }
            };
        }
        
        const response = await fetch(url, {
            method: method,
            headers: headers,
            body: JSON.stringify(body)
        });
        
        if (response.ok) {
            const data = await response.json();
            
            if (!gistId) {
                gistId = data.id;
                localStorage.setItem('gist_id', gistId);
            }
            
            knowledgeBase = text;
            localStorage.setItem('shared_knowledge', text);
            document.getElementById('dbStatus').textContent = '☁️ облако';
            document.getElementById('dbStatus').style.color = '#90EE90';
            
            return 'cloud';
        }
    } catch (e) {
        console.log('Ошибка облака, сохраняем локально');
    }
    
    // Fallback: локальное сохранение
    knowledgeBase = text;
    localStorage.setItem('shared_knowledge', text);
    return 'local';
}

// ========== ИНТЕРФЕЙС ==========
function openAdminPanel() {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('adminPanel').classList.add('show');
    document.getElementById('knowledgeText').value = knowledgeBase;
}

function closeAdminPanel() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('adminPanel').classList.remove('show');
    document.getElementById('adminPass').value = '';
    document.getElementById('adminStatus').textContent = '';
}

async function updateKnowledge() {
    const pass = document.getElementById('adminPass').value;
    if (pass !== ADMIN_PASS) {
        document.getElementById('adminStatus').textContent = '❌ Неверный пароль';
        document.getElementById('adminStatus').style.color = 'red';
        return;
    }
    
    const text = document.getElementById('knowledgeText').value;
    if (!text.trim()) {
        document.getElementById('adminStatus').textContent = '❌ Введите текст';
        document.getElementById('adminStatus').style.color = 'red';
        return;
    }
    
    const status = document.getElementById('adminStatus');
    status.textContent = '⏳ Сохраняю...';
    status.style.color = 'blue';
    
    const result = await saveToCloud(text);
    
    if (result === 'cloud') {
        status.textContent = '✅ База обновлена в облаке! Все пользователи видят изменения.';
    } else {
        status.textContent = '✅ База обновлена локально. Для облака добавьте GitHub Token.';
    }
    status.style.color = 'green';
    
    setTimeout(closeAdminPanel, 1500);
}

// ========== ПОИСК ОТВЕТА ==========
function findBestAnswer(question) {
    if (!knowledgeBase || knowledgeBase.length < 10) {
        return "База знаний пока пуста. Дождитесь, пока администратор добавит информацию.";
    }
    
    const q = question.toLowerCase();
    const sentences = knowledgeBase.split(/[.!?]\s+/);
    
    let bestSentence = '';
    let bestScore = 0;
    const qWords = q.split(/\s+/).filter(w => w.length > 2);
    
    for (let sentence of sentences) {
        const s = sentence.toLowerCase();
        let score = 0;
        
        for (let word of qWords) {
            if (s.includes(word)) score += 2;
        }
        
        if (s.includes(q)) score += 10;
        
        const numbers = q.match(/\d+/g);
        if (numbers) {
            for (let num of numbers) {
                if (s.includes(num)) score += 5;
            }
        }
        
        if (score > bestScore) {
            bestScore = score;
            bestSentence = sentence;
        }
    }
    
    if (bestScore >= 2) {
        return bestSentence.trim();
    } else if (bestScore > 0) {
        return `Возможно, вы ищете это:\n\n"${bestSentence.trim()}"`;
    } else {
        return `В базе знаний нет точного ответа на этот вопрос.\n\nПопробуйте переформулировать или обратитесь к администратору.`;
    }
}

// ========== ОТПРАВКА СООБЩЕНИЯ ==========
async function askQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    
    if (!question) return;
    
    addMessage(question, 'user');
    input.value = '';
    
    document.getElementById('typing').style.display = 'block';
    document.getElementById('askBtn').disabled = true;
    
    await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));
    
    const answer = findBestAnswer(question);
    
    document.getElementById('typing').style.display = 'none';
    addMessage(answer, 'bot');
    document.getElementById('askBtn').disabled = false;
}

function addMessage(text, type) {
    const messagesDiv = document.getElementById('messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}-message`;
    messageDiv.textContent = text;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function handleKeyPress(event) {
    if (event.key === 'Enter') askQuestion();
}

// ========== ДОПОЛНИТЕЛЬНО: СОЗДАНИЕ ТОКЕНА ==========
console.log('💡 Для облачного хранения:');
console.log('1. Зайди на github.com/settings/tokens');
console.log('2. Создай токен с правом gist');
console.log('3. Вставь его при первом сохранении');
</script>
</body>
</html>
