<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нейросеть с памятью</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .chat-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; height: 90vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; font-weight: 500; }
        .header-actions { display: flex; gap: 10px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; opacity: 0.7; transition: all 0.3s; }
        .header-btn:hover { opacity: 1; background: rgba(255,255,255,0.3); }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #f8f9fa; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; animation: fadeIn 0.3s; white-space: pre-wrap; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-message { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .typing-indicator { background: white; padding: 12px 16px; border-radius: 18px; align-self: flex-start; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .typing-indicator span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #999; margin: 0 2px; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        .input-area input { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 30px; font-size: 15px; outline: none; }
        .input-area input:focus { border-color: #667eea; }
        .input-area button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0 25px; border-radius: 30px; font-size: 16px; cursor: pointer; }
        .input-area button:disabled { opacity: 0.5; }
        
        /* Модальные окна */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 1000; width: 90%; max-width: 500px; display: none; }
        .modal.show { display: block; }
        .modal.large { max-width: 700px; }
        .modal h2 { margin-bottom: 20px; color: #333; }
        .modal input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; margin-bottom: 20px; font-size: 16px; }
        .modal textarea { width: 100%; height: 300px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 15px; resize: vertical; margin-bottom: 20px; font-size: 14px; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-danger { background: #dc3545; color: white; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.show { display: block; }
        
        /* Статус */
        .status-badge { font-size: 11px; background: rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 20px; }
        
        /* Управление текстом в админке */
        .text-editor { margin-top: 20px; }
        .text-preview { background: #f8f9fa; padding: 15px; border-radius: 10px; max-height: 200px; overflow-y: auto; margin-bottom: 15px; font-size: 13px; white-space: pre-wrap; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat { background: #f0f0f0; padding: 10px 15px; border-radius: 10px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-card">
        <div class="header">
            <h1>🧠 Нейросеть с памятью <span class="status-badge" id="dbStatus">онлайн</span></h1>
            <div class="header-actions">
                <button class="header-btn" onclick="clearHistory()" title="Очистить историю">🗑️</button>
                <button class="header-btn" onclick="showLoginModal()" title="Админ-панель">⚙️</button>
            </div>
        </div>
        
        <div class="messages-area" id="messages"></div>
        
        <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
        
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Задайте вопрос..." onkeypress="handleKeyPress(event)">
            <button onclick="askQuestion()" id="askBtn">➤</button>
        </div>
    </div>
</div>

<!-- Оверлей -->
<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<!-- Модальное окно входа -->
<div class="modal" id="loginModal">
    <h2>🔐 Вход в админ-панель</h2>
    <input type="password" id="adminPass" placeholder="Введите пароль">
    <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeAllModals()">Отмена</button>
        <button class="btn btn-primary" onclick="login()">Войти</button>
    </div>
</div>

<!-- Модальное окно админки -->
<div class="modal large" id="adminModal">
    <h2>⚙️ Управление базой знаний</h2>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="charCount">0</div>
            <div class="stat-label">Символов</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="lineCount">0</div>
            <div class="stat-label">Строк</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="historyCount">0</div>
            <div class="stat-label">Сообщений в истории</div>
        </div>
    </div>
    
    <label style="font-weight: bold; margin-bottom: 10px; display: block;">📝 Текущая база знаний:</label>
    <div class="text-preview" id="textPreview"></div>
    
    <div class="text-editor">
        <label style="font-weight: bold; margin-bottom: 10px; display: block;">✏️ Редактировать:</label>
        <textarea id="knowledgeText" placeholder="Вставьте или отредактируйте текст базы знаний..."></textarea>
    </div>
    
    <div class="modal-buttons" style="justify-content: space-between;">
        <button class="btn btn-danger" onclick="clearKnowledge()">🗑️ Очистить всё</button>
        <div>
            <button class="btn btn-secondary" onclick="closeAllModals()">Отмена</button>
            <button class="btn btn-primary" onclick="saveKnowledge()">💾 Сохранить и обучить</button>
        </div>
    </div>
    <p id="adminStatus" style="margin-top: 15px; color: green;"></p>
</div>

<script>
const ADMIN_PASS = 'admin123';
let knowledgeBase = '';
let chatHistory = [];
let isAdmin = false;

// ========== ПРИВЕТСТВИЯ ==========
const GREETINGS = {
    'привет': 'Здравствуйте! 👋 Чем могу помочь?',
    'здравствуй': 'Здравствуйте! Я готов ответить на ваши вопросы.',
    'здравствуйте': 'Добрый день! Спрашивайте, я помогу.',
    'доброе утро': 'Доброе утро! ☀️ Что вас интересует?',
    'добрый день': 'Добрый день! Чем могу быть полезен?',
    'добрый вечер': 'Добрый вечер! 🌙 Задавайте вопросы.',
    'хай': 'Привет! 👋 Что хотите узнать?',
    'как дела': 'У меня всё отлично! Я работаю 24/7 и всегда готов помочь. А как у вас дела?',
    'кто ты': 'Я — Нейросеть с памятью. Моя задача — отвечать на вопросы по загруженной базе знаний. Я помню контекст разговора и могу обучаться на новых данных.',
    'что ты умеешь': 'Я умею:\n• Отвечать на вопросы по базе знаний\n• Помнить историю диалога\n• Обучаться на новых текстах\n• Находить пароли, контакты, расписание\n• Поддерживать беседу',
    'спасибо': 'Пожалуйста! 😊 Обращайтесь ещё.',
    'пока': 'До свидания! 👋 Буду ждать новых вопросов.'
};

// ========== ИНИЦИАЛИЗАЦИЯ ==========
function init() {
    // Загружаем базу знаний
    const saved = localStorage.getItem('knowledge_base');
    knowledgeBase = saved || '';
    
    // Загружаем историю
    const savedHistory = localStorage.getItem('chat_history');
    if (savedHistory) {
        chatHistory = JSON.parse(savedHistory);
        renderHistory();
    } else {
        addBotMessage('👋 Здравствуйте! Я Нейросеть с памятью. Задавайте вопросы!');
    }
    
    // Пытаемся загрузить из облака
    loadFromCloud();
    
    updateStats();
}

// ========== ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ ==========
async function loadFromCloud() {
    const token = localStorage.getItem('gist_token');
    const gistId = localStorage.getItem('gist_id');
    if (token && gistId) {
        try {
            const r = await fetch(`https://api.github.com/gists/${gistId}`, { 
                headers: { 'Authorization': `token ${token}` } 
            });
            if (r.ok) {
                const d = await r.json();
                const c = d.files['knowledge.txt']?.content || '';
                if (c && c !== knowledgeBase) {
                    knowledgeBase = c;
                    localStorage.setItem('knowledge_base', c);
                    document.getElementById('dbStatus').textContent = '☁️ облако';
                }
            }
        } catch(e) {}
    }
    updatePreview();
}

async function saveToCloud(text) {
    const token = localStorage.getItem('gist_token');
    let gistId = localStorage.getItem('gist_id');
    if (!token) return 'local';
    
    try {
        const h = { 
            'Authorization': `token ${token}`, 
            'Content-Type': 'application/json' 
        };
        let method = 'POST', url = 'https://api.github.com/gists';
        let body = { 
            description: 'AI Knowledge Base with Memory', 
            public: false, 
            files: { 'knowledge.txt': { content: text } } 
        };
        if (gistId) { 
            method = 'PATCH'; 
            url = `https://api.github.com/gists/${gistId}`; 
            body = { files: { 'knowledge.txt': { content: text } } }; 
        }
        const r = await fetch(url, { method, headers: h, body: JSON.stringify(body) });
        if (r.ok) { 
            const d = await r.json(); 
            if (!gistId) localStorage.setItem('gist_id', d.id); 
            return 'cloud'; 
        }
    } catch(e) {}
    return 'local';
}

// ========== ИНТЕРФЕЙС ==========
function showLoginModal() {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('loginModal').classList.add('show');
    document.getElementById('adminPass').value = '';
    document.getElementById('adminPass').focus();
}

function login() {
    const pass = document.getElementById('adminPass').value;
    if (pass === ADMIN_PASS) {
        isAdmin = true;
        closeAllModals();
        showAdminModal();
    } else {
        alert('❌ Неверный пароль');
    }
}

function showAdminModal() {
    if (!isAdmin) {
        showLoginModal();
        return;
    }
    updatePreview();
    updateStats();
    document.getElementById('knowledgeText').value = knowledgeBase;
    document.getElementById('overlay').classList.add('show');
    document.getElementById('adminModal').classList.add('show');
}

function closeAllModals() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('loginModal').classList.remove('show');
    document.getElementById('adminModal').classList.remove('show');
    document.getElementById('adminPass').value = '';
}

function updatePreview() {
    const preview = document.getElementById('textPreview');
    if (knowledgeBase) {
        preview.textContent = knowledgeBase.length > 500 ? 
            knowledgeBase.substring(0, 500) + '...' : knowledgeBase;
    } else {
        preview.textContent = 'База знаний пуста. Добавьте текст для обучения.';
    }
}

function updateStats() {
    document.getElementById('charCount').textContent = knowledgeBase.length;
    document.getElementById('lineCount').textContent = knowledgeBase.split('\n').filter(l => l.trim()).length;
    document.getElementById('historyCount').textContent = chatHistory.length;
}

async function saveKnowledge() {
    const text = document.getElementById('knowledgeText').value;
    knowledgeBase = text;
    localStorage.setItem('knowledge_base', text);
    
    // Сохраняем в облако
    const result = await saveToCloud(text);
    
    const status = document.getElementById('adminStatus');
    if (result === 'cloud') {
        status.textContent = '✅ База сохранена в облаке и готова к использованию!';
        document.getElementById('dbStatus').textContent = '☁️ облако';
    } else {
        status.textContent = '✅ База сохранена локально';
    }
    
    updatePreview();
    updateStats();
    
    // Добавляем сообщение об обучении
    addBotMessage('📚 База знаний обновлена! Я готов отвечать на новые вопросы.');
    
    setTimeout(() => {
        status.textContent = '';
        closeAllModals();
    }, 1500);
}

function clearKnowledge() {
    if (confirm('Вы уверены? Вся база знаний будет удалена.')) {
        knowledgeBase = '';
        localStorage.setItem('knowledge_base', '');
        document.getElementById('knowledgeText').value = '';
        updatePreview();
        updateStats();
        addBotMessage('🗑️ База знаний очищена.');
    }
}

function clearHistory() {
    if (confirm('Очистить историю диалога?')) {
        chatHistory = [];
        localStorage.removeItem('chat_history');
        document.getElementById('messages').innerHTML = '';
        addBotMessage('🔄 История очищена. Начинаем новый диалог!');
    }
}

// ========== НЕЙРОСЕТЬ ==========
function findAnswer(question) {
    const q = question.toLowerCase().trim();
    
    // 1. Приветствия
    for (let [key, answer] of Object.entries(GREETINGS)) {
        if (q.includes(key)) return answer;
    }
    
    // 2. Учет истории (если вопрос связан с предыдущим)
    if (chatHistory.length > 0) {
        const lastBot = chatHistory.filter(m => m.type === 'bot').pop();
        const lastUser = chatHistory.filter(m => m.type === 'user').pop();
        
        // Если спрашивают "а еще?" или "что еще?"
        if (q.includes('ещё') || q.includes('еще') || q.includes('другой')) {
            if (lastBot && lastBot.text.includes('пароль')) {
                return findRelatedInfo('пароль', lastBot.text);
            }
        }
    }
    
    // 3. Поиск по базе
    if (!knowledgeBase) {
        return "База знаний пока пуста. Администратор ещё не загрузил информацию. Я могу поддержать беседу, но для серьёзных вопросов нужна база знаний.";
    }
    
    const sentences = knowledgeBase.split(/[.!?]\s+/).filter(s => s.length > 5);
    const qWords = q.split(/[\s,;?!]+/).filter(w => w.length > 2);
    
    const scored = sentences.map(sentence => {
        const s = sentence.toLowerCase();
        let score = 0;
        
        // Совпадение слов
        for (let w of qWords) { 
            if (s.includes(w)) score += 10;
        }
        
        // Числа
        const qNums = q.match(/\d+/g) || [];
        const sNums = s.match(/\d+/g) || [];
        qNums.forEach(n => { if (sNums.includes(n)) score += 20; });
        
        // Специальные паттерны
        if ((q.includes('когда') || q.includes('время')) && s.match(/\d{1,2}[:.]\d{2}/)) score += 15;
        if ((q.includes('почта') || q.includes('email')) && s.includes('@')) score += 15;
        if (q.includes('кто') && s.match(/[А-Я][а-я]+\s[А-Я][а-я]+/)) score += 15;
        if ((q.includes('пароль') || q.includes('код')) && (s.includes('пароль') || s.includes('код'))) score += 25;
        
        return { sentence, score };
    });
    
    scored.sort((a, b) => b.score - a.score);
    
    if (scored[0].score > 20) return scored[0].sentence.trim();
    if (scored[0].score > 10) return `Вот что нашлось:\n\n"${scored[0].sentence.trim()}"`;
    if (scored[0].score > 5) return `Возможно, это:\n\n"${scored[0].sentence.trim()}"\n\nЕсли нет — уточните вопрос.`;
    
    return `К сожалению, в базе знаний нет точной информации по запросу "${question}".\n\nПопробуйте переформулировать вопрос.`;
}

function findRelatedInfo(topic, exclude) {
    const sentences = knowledgeBase.split(/[.!?]\s+/);
    for (let s of sentences) {
        if (s.toLowerCase().includes(topic) && !s.includes(exclude.substring(0, 30))) {
            return `Вот ещё информация:\n\n"${s.trim()}"`;
        }
    }
    return "Больше информации по этой теме нет.";
}

// ========== ИСТОРИЯ И СООБЩЕНИЯ ==========
async function askQuestion() {
    const input = document.getElementById('questionInput');
    const q = input.value.trim();
    if (!q) return;
    
    addUserMessage(q);
    input.value = '';
    
    document.getElementById('typing').style.display = 'flex';
    document.getElementById('askBtn').disabled = true;
    
    await new Promise(r => setTimeout(r, 500 + Math.random() * 800));
    
    const answer = findAnswer(q);
    
    document.getElementById('typing').style.display = 'none';
    addBotMessage(answer);
    document.getElementById('askBtn').disabled = false;
}

function addUserMessage(text) {
    addMessage(text, 'user');
}

function addBotMessage(text) {
    addMessage(text, 'bot');
}

function addMessage(text, type) {
    chatHistory.push({ text, type, time: Date.now() });
    localStorage.setItem('chat_history', JSON.stringify(chatHistory));
    
    const messagesDiv = document.getElementById('messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}-message`;
    messageDiv.textContent = text;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    
    updateStats();
}

function renderHistory() {
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML = '';
    chatHistory.forEach(msg => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${msg.type}-message`;
        messageDiv.textContent = msg.text;
        messagesDiv.appendChild(messageDiv);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function handleKeyPress(e) { 
    if (e.key === 'Enter') askQuestion(); 
}

// Запуск
init();
</script>
</body>
</html>
